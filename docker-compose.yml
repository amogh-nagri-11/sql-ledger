services:
  db:
    image: postgres:16
    container_name: ledger-db
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    container_name: ledger-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@db:5432/ledger
      PORT: "3000"
    ports:
      - "3000:3000"
    # For local dev you can instead run the API on the host with `npm run dev`
    # inside ./server and just use the `db` service here.

volumes:
  ledger-pgdata:
